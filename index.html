<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Love ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            background-color: #fff0f5;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .container {
            background-color: white;
            padding: 2.5rem;
            border-radius: 2rem;
            box-shadow: 0 15px 40px rgba(255, 105, 180, 0.2);
            text-align: center;
            max-width: 400px;
            width: 90%;
            position: relative;
            z-index: 10;
            transition: all 0.5s ease;
        }

        .image-frame {
            width: 200px;
            height: 200px;
            margin: 0 auto 1.5rem;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid #ff1493;
            box-shadow: 0 0 15px rgba(255, 20, 147, 0.3);
        }

        .gf-photo {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 { color: #ff1493; font-size: 1.8rem; margin-bottom: 0.5rem; }
        p { color: #ff69b4; margin-bottom: 2rem; }

        .btn-group {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
        }

        button {
            padding: 0.8rem 1.8rem;
            font-size: 1.1rem;
            border-radius: 1.5rem;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        .yes-btn {
            background-color: #ff1493;
            color: white;
            box-shadow: 0 4px 10px rgba(255, 20, 147, 0.3);
        }

        .yes-btn:hover { transform: scale(1.1); background-color: #ff69b4; }

        .no-btn {
            background-color: #808080;
            color: white;
            position: relative;
        }

        /* Pop-up Modal Styles */
        #success-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.5);
            background: white;
            padding: 2rem;
            border-radius: 2rem;
            box-shadow: 0 0 100px rgba(255, 20, 147, 0.5);
            text-align: center;
            z-index: 1000;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: 80%;
            max-width: 350px;
        }

        #success-modal.show {
            display: block;
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            z-index: 999;
        }

        .heart {
            position: absolute;
            font-size: 2rem;
            animation: float 4s linear forwards;
            pointer-events: none;
            opacity: 0;
            z-index: 1001;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; }
        }

        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background-color: #ff1493;
            z-index: 1002;
            animation: confetti-fall 3s linear forwards;
        }

        @keyframes confetti-fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container" id="main-card">
        <h1>Hey Beautiful... 🌹</h1>
        <div class="image-frame">
            <img src="gf.png" alt="My GF" class="gf-photo" onerror="this.src='https://via.placeholder.com/200?text=Girlfriend+Photo'">
        </div>
        <p>Will you go on a date with me? ❤️</p>
        <div class="btn-group">
            <button class="yes-btn" onclick="sayYes()">YES! 😍</button>
            <button class="no-btn" id="noButton" onmouseover="moveButton()">No 🥺</button>
        </div>
    </div>

    <div class="modal-overlay" id="overlay"></div>
    
    <div id="success-modal">
        <h2 style="color: #ff1493; font-size: 2rem; margin-bottom: 1rem;">IT'S A DATE! ❤️</h2>
        <div class="image-frame" style="width: 150px; height: 150px;">
            <img src="gf.png" alt="My GF" class="gf-photo" onerror="this.src='https://via.placeholder.com/200?text=Girlfriend+Photo'">
        </div>
        <p style="color: #ff69b4; font-size: 1.1rem; margin-bottom: 1.5rem;">
            You made me the happiest person ever! 💖<br>
            Prepare for the best date of your life!
        </p>
        <button class="yes-btn" onclick="closeModal()">I'm Ready! 😘</button>
    </div>

    <script>
        function moveButton() {
            const btn = document.getElementById('noButton');
            const margin = 100;
            const x = Math.random() * (window.innerWidth - btn.offsetWidth - margin);
            const y = Math.random() * (window.innerHeight - btn.offsetHeight - margin);
            
            btn.style.position = 'fixed';
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
        }

        function sayYes() {
            // Show Modal and Overlay
            const modal = document.getElementById('success-modal');
            const overlay = document.getElementById('overlay');
            modal.style.display = 'block';
            overlay.style.display = 'block';
            
            // Trigger animation after display block
            setTimeout(() => {
                modal.classList.add('show');
            }, 10);
            
            // Celebration effects
            startCelebration();
        }

        function closeModal() {
            document.getElementById('success-modal').classList.remove('show');
            document.getElementById('overlay').style.display = 'none';
            setTimeout(() => {
                document.getElementById('success-modal').style.display = 'none';
            }, 400);
        }

        function startCelebration() {
            // Floating hearts
            const heartInterval = setInterval(() => {
                if(!document.getElementById('overlay').style.display || document.getElementById('overlay').style.display === 'none') {
                    clearInterval(heartInterval);
                    return;
                }
                const heart = document.createElement('div');
                heart.innerHTML = '❤️';
                heart.className = 'heart';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.fontSize = (Math.random() * 20 + 20) + 'px';
                heart.style.animationDuration = (Math.random() * 2 + 3) + 's';
                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), 4000);
            }, 150);

            // Confetti
            for(let i=0; i<50; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * 100 + 'vw';
                    confetti.style.backgroundColor = ['#ff1493', '#ff69b4', '#ffb6c1', '#ffffff'][Math.floor(Math.random() * 4)];
                    confetti.style.width = (Math.random() * 8 + 5) + 'px';
                    confetti.style.height = confetti.style.width;
                    confetti.style.animationDuration = (Math.random() * 2 + 1) + 's';
                    document.body.appendChild(confetti);
                    setTimeout(() => confetti.remove(), 3000);
                }, i * 20);
            }
        }
    </script>
</body>
</html>
